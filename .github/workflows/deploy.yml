name: Auto Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/AiGen-Python-Aistudio-
            git pull origin main
            [ ! -d "venv" ] && python3 -m venv venv
            source venv/bin/activate && pip install -r requirements.txt
            screen -S server -X quit || true
            screen -S worker -X quit || true
            sleep 2
            screen -dmS server bash -c 'source venv/bin/activate && while true; do python -u server.py >> server.log 2>&1; echo "Crased, restarting in 3s..." >> server.log; sleep 3; done'
            screen -dmS worker bash -c 'source venv/bin/activate && while true; do python -u worker.py >> worker.log 2>&1; echo "Crased, restarting in 3s..." >> worker.log; sleep 3; done'
